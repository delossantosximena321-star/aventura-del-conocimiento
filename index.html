<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aventura del Conocimiento</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(270deg, #1e3c72, #2a5298);
  background-size: 400% 400%;
  animation: fondo 10s infinite alternate;
  color:white;
  text-align:center;
}

@keyframes fondo{
  0%{background-position:left;}
  100%{background-position:right;}
}

.container{
  margin-top:60px;
}

button{
  display:block;
  margin:10px auto;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  background:#00c6ff;
  color:white;
  transition:0.3s;
}

button:hover{
  background:#0072ff;
  transform:scale(1.1);
}

#resultado{
  font-size:22px;
  margin-top:20px;
}
</style>
</head>

<body>

<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b41c3.mp3?filename=adventure-theme-110997.mp3" type="audio/mpeg">
</audio>

<div class="container">
<h1>🎮 Aventura del Conocimiento</h1>
<h2 id="pregunta"></h2>
<div id="opciones"></div>
<p id="resultado"></p>
</div>

<script>
let preguntas = [
{
pregunta:"¿Capital de México?",
opciones:["Guadalajara","Monterrey","Ciudad de México","Puebla"],
correcta:2
},
{
pregunta:"¿Cuánto es 8 x 7?",
opciones:["54","56","64","48"],
correcta:1
},
{
pregunta:"¿Quién descubrió América?",
opciones:["Colón","Newton","Einstein","Darwin"],
correcta:0
},
{
pregunta:"¿Planeta rojo?",
opciones:["Venus","Marte","Júpiter","Saturno"],
correcta:1
},
{
pregunta:"¿Resultado de 9+6?",
opciones:["14","15","16","13"],
correcta:1
},
{
pregunta:"¿Animal más rápido?",
opciones:["León","Tigre","Guepardo","Lobo"],
correcta:2
},
{
pregunta:"¿Lenguaje de esta página?",
opciones:["Python","HTML","Java","C++"],
correcta:1
},
{
pregunta:"¿Océano más grande?",
opciones:["Atlántico","Pacífico","Índico","Ártico"],
correcta:1
}
];

let actual = 0;

function mostrarPregunta(){
document.getElementById("resultado").innerHTML="";
let p = preguntas[actual];
document.getElementById("pregunta").innerHTML = p.pregunta;
let opcionesHTML="";
p.opciones.forEach((op,i)=>{
opcionesHTML+=`<button onclick="verificar(${i})">${op}</button>`;
});
document.getElementById("opciones").innerHTML = opcionesHTML;
}

function verificar(i){
if(i===preguntas[actual].correcta){
document.getElementById("resultado").innerHTML="✅ Correcto!";
}else{
document.getElementById("resultado").innerHTML="❌ Incorrecto!";
}

actual++;

if(actual<preguntas.length){
setTimeout(mostrarPregunta,1000);
}else{
document.getElementById("pregunta").innerHTML="🏆 ¡Juego terminado!";
document.getElementById("opciones").innerHTML="";
}
}

mostrarPregunta();
</script>

</body>
</html>
